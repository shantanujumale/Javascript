<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Billing Calculator</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 200px; }
        button { padding: 8px 15px; background: #76cf60; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; font-size: 1.2em; color: #a7283f; }
    </style>
</head>
<body>

    <h2>Billing Calculator</h2>
    
    <div class="form-group">
        <label for="price">Item Price ($):</label>
        <input type="number" id="price" value="100">
    </div>

    <div class="form-group">
        <label for="quantity">Quantity:</label>
        <input type="number" id="quantity" value="2">
    </div>

    <!-- The event listener is attached via JavaScript in script.js -->
    <button id="calcBtn">Calculate Total</button>

    <div id="result"></div>

    <!-- Link to the external JavaScript file -->
    <script src="practical_02_script.js"></script>
</body>
</html>
