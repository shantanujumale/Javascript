<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#a7b1bb,#838045);
        }

        .container{
            width:400px;
            background:#fff;
            padding:30px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
            text-align:center;
        }

        /* Student Details in Center */
        .student{
            font-size:18px;
            font-weight:bold;
            color:#333;
            margin-bottom:20px;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
            font-size:16px;
            outline:none;
            transition:0.3s;
        }

        input:focus{
            border-color:#4facfe;
            box-shadow:0 0 8px rgba(79,172,254,0.5);
        }

        button{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#008cff;
            transform:scale(1.03);
        }

        #result{
            margin-top:20px;
            padding:15px;
            background:#f5f9ff;
            border-left:5px solid #4facfe;
            border-radius:8px;
            text-align:left;
            line-height:1.8;
            font-size:16px;
            color:#333;
            display:inline-block;
            width:100%;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- Student Details Centered -->
        <div class="student">
            Name: Shantanu Jumale <br>
            PRN: 24070521096
        </div>

        <h2>🧾 Billing Calculator</h2>

        <input type="text" id="name" placeholder="Enter Customer Name">
        <input type="number" id="price" placeholder="Enter Item Price">
        <input type="number" id="quantity" placeholder="Enter Quantity">

        <button onclick="calculateBill()">Calculate Bill</button>

        <div id="result">
            Enter the details and click <b>Calculate Bill</b>.
        </div>

    </div>

    <script>
        // Demonstration of var, let, const, template literals and destructuring
        function calculateBill() {
            // var
            var customerName = document.getElementById("name").value;

            // let
            let price = Number(document.getElementById("price").value);
            let quantity = Number(document.getElementById("quantity").value);

            // const
            const GST = 0.18;

            let total = price * quantity;
            let gstAmount = total * GST;
            let finalBill = total + gstAmount;

            // Object
            const bill = {
                name: customerName,
                totalAmount: total,
                gst: gstAmount,
                payable: finalBill
            };

            // Destructuring
            const {name, totalAmount, gst, payable} = bill;

            // Template Literal
            document.getElementById("result").innerHTML = `
                Customer: ${name}<br>
                Total: ₹${totalAmount.toFixed(2)}<br>
                GST (18%): ₹${gst.toFixed(2)}<br>
                Final Bill: ₹${payable.toFixed(2)}
            `;

            console.log(`Customer ${name} has to pay ₹${payable.toFixed(2)}`);
        }
    </script>

</body>
</html>
